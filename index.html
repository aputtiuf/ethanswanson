<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ethan Swanson | University of Florida</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="card" aria-label="Ethan Swanson contact card">
      <div class="hero-panel">
        <div class="pattern pattern-left"></div>
        <div class="pattern pattern-right"></div>
        <img src="assets/gator-logo.png" alt="Florida Gators logo" class="gator-logo" />
        <p class="school-top">University of Florida</p>
      </div>

      <div class="profile-wrap">
        <img src="assets/ethan.jpg" alt="Ethan Swanson" class="profile-photo" />
      </div>

      <section class="content">
        <h1><span>Ethan</span> Swanson</h1>
        <p class="university">University of Florida</p>

        <div class="contact-list">
          <a class="contact-row" href="mailto:swanson.ethan@ufl.edu" aria-label="Email Ethan Swanson">
            <span class="icon">✉</span>
            <span class="contact-text">swanson.ethan@ufl.edu</span>
            <span class="chevron">›</span>
          </a>

          <a class="contact-row" href="tel:+18638430955" aria-label="Call Ethan Swanson">
            <span class="icon">☎</span>
            <span class="contact-text">+1 (863) 843-0955</span>
            <span class="chevron">›</span>
          </a>

          <a class="contact-row" href="https://www.linkedin.com/in/ethan-swanson1" target="_blank" rel="noopener" aria-label="Open Ethan Swanson LinkedIn">
            <span class="icon linkedin">in</span>
            <span class="contact-text">LinkedIn</span>
            <span class="chevron">›</span>
          </a>
        </div>

        <button class="add-contact" id="addContact" type="button">
          <span class="contact-icon">▣</span>
          <span>
            <strong>Add Contact</strong>
            <small>University of Florida</small>
          </span>
          <span class="download-icon">↓</span>
        </button>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
