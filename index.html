<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B1220" />
  <title>Ethan Swanson | Contact Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="scene">
    <section class="glass-card" aria-label="Ethan Swanson digital contact card">
      <div class="orb orb-one"></div>
      <div class="orb orb-two"></div>

      <header class="hero">
        <div class="photo-wrap">
          <img src="ethan.jpg" alt="Ethan Swanson" class="profile-photo" />
        </div>

        <div class="identity">
          <div class="university-mark">
            <img src="uf-logo.png" alt="Florida Gators logo" />
            <span>University of Florida</span>
          </div>

          <h1>Ethan Swanson</h1>
          <p class="subtitle">Digital Contact Card</p>
        </div>
      </header>

      <section class="contact-panel">
        <a class="contact-line" href="tel:+18638430955" aria-label="Call Ethan Swanson">
          <span class="icon">☎</span>
          <div>
            <small>Phone</small>
            <strong>+1 (863) 843-0955</strong>
          </div>
        </a>

        <a class="contact-line" href="mailto:swanson.ethan@ufl.edu" aria-label="Email Ethan Swanson">
          <span class="icon">✉</span>
          <div>
            <small>Email</small>
            <strong>swanson.ethan@ufl.edu</strong>
          </div>
        </a>

        <a class="contact-line" href="https://www.linkedin.com/in/ethan-swanson1" target="_blank" rel="noopener noreferrer" aria-label="Open Ethan Swanson LinkedIn">
          <span class="icon linkedin">in</span>
          <div>
            <small>LinkedIn</small>
            <strong>ethan-swanson1</strong>
          </div>
        </a>
      </section>

      <button class="save-button" id="addContactButton" type="button">
        <span>Add This Contact</span>
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
